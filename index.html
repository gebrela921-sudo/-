<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQR SYSTEM | 2026</title>
    <style>
        :root { 
            --gold: #d4af37; --bg: #050505; --card: #121212; 
            --blue: #2196F3; --green: #4CAF50; --red: #f44336; --txt: #ffffff; 
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 120px; }

        header { padding: 20px; text-align: center; background: #111; border-bottom: 2px solid var(--gold); }
        #liveTime { font-size: 28px; font-weight: bold; color: var(--gold); }

        nav { display: flex; justify-content: center; background: #111; padding: 10px; gap: 8px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        nav button { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--gold); color: #000; }
        
        #notifToggleBtn.enabled { color: var(--green); border-color: var(--green); }
        #notifToggleBtn.disabled { color: var(--red); border-color: var(--red); }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }

        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        .task-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #181818; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            border-right: 5px solid var(--blue);
        }
        .task-item.done { border-right-color: var(--green); opacity: 0.6; }
        .striked h4 { text-decoration: line-through; color: #666; }

        footer { background: #000; padding: 25px; text-align: center; border-top: 1px solid #1a1a1a; position: fixed; bottom: 0; width: 100%; }
        .footer-text { color: white; font-size: 15px; }
        .footer-text span.brand { color: var(--gold); font-weight: bold; }

        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

<header>
    <div id="liveTime">00:00:00</div>
    <div style="font-size: 12px; color: var(--gold);">SAQR DESIGN SYSTEM</div>
</header>

<nav>
    <button onclick="switchPage('today')" id="nav-today" class="active">📍 مهامي</button>
    <button onclick="switchPage('future')" id="nav-future">📅 جدولة</button>
    <button id="notifToggleBtn" onclick="toggleNotifications()" class="disabled">🔕 تنبيهات النظام: معطلة</button>
</nav>

<div class="container">
    <div id="page-future" class="page">
        <div class="card">
            <h3>جدولة مهمة جديدة</h3>
            <input type="text" id="taskName" placeholder="عنوان المهمة">
            <input type="date" id="taskDate">
            <input type="time" id="taskTime">
            <button class="btn-add" onclick="addNewTask()">حفظ المهمة</button>
        </div>
    </div>

    <div id="page-today" class="page active-page">
        <div id="list-today"></div>
    </div>
</div>

<footer>
    <div class="footer-text">© 2026 <span class="brand">SAQR DESIGN</span>. جميع الحقوق محفوظة.</div>
</footer>

<script>
    let tasks = JSON.parse(localStorage.getItem('SAQR_FINAL_DB')) || [];
    let isNotifEnabled = JSON.parse(localStorage.getItem('SAQR_NOTIF_ON')) || false;

    window.onload = () => {
        updateBtnUI();
        render();
    };

    function toggleNotifications() {
        if (!isNotifEnabled) {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    isNotifEnabled = true;
                    alert("رائع! الإشعارات ستظهر الآن في شريط تنبيهات هاتفك ✅");
                } else {
                    alert("يجب السماح بالإشعارات من إعدادات المتصفح لتظهر في الشريط العلوي ⚠️");
                }
                saveConfig();
            });
        } else {
            isNotifEnabled = false;
            saveConfig();
        }
    }

    function saveConfig() {
        localStorage.setItem('SAQR_NOTIF_ON', JSON.stringify(isNotifEnabled));
        updateBtnUI();
    }

    function updateBtnUI() {
        const btn = document.getElementById('notifToggleBtn');
        btn.innerText = isNotifEnabled ? "🔔 تنبيهات النظام: مفعلة" : "🔕 تنبيهات النظام: معطلة";
        btn.className = isNotifEnabled ? "enabled" : "disabled";
    }

    // فحص المواعيد
    setInterval(() => {
        const now = new Date();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('ar-EG');
        
        if (!isNotifEnabled) return;

        const d = now.toISOString().split('T')[0];
        const tNow = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        tasks.forEach(task => {
            if (task.date === d && task.time === tNow && !task.notified) {
                task.notified = true;
                saveData();
                
                // إرسال الإشعار لشريط النظام
                if (Notification.permission === "granted") {
                    const n = new Notification("SAQR DESIGN", {
                        body: `تذكير: حان موعد ${task.name}`,
                        icon: "https://cdn-icons-png.flaticon.com/512/311/311024.png",
                        tag: "task-alert" // لمنع تكرار نفس الإشعار
                    });
                    
                    // صوت تنبيه
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
                }
            }
        });
    }, 1000);

    function addNewTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const time = document.getElementById('taskTime').value;
        if(!name || !date || !time) return alert("اكمل البيانات");
        tasks.push({ id: Date.now(), name, date, time, done: false, notified: false });
        saveData();
        switchPage('today');
    }

    function toggleDone(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        saveData();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveData();
    }

    function saveData() {
        localStorage.setItem('SAQR_FINAL_DB', JSON.stringify(tasks));
        render();
    }

    function render() {
        const area = document.getElementById('list-today');
        area.innerHTML = tasks.map(t => `
            <div class="task-item ${t.done ? 'done' : ''}">
                <div class="task-text ${t.done ? 'striked' : ''}" onclick="toggleDone(${t.id})">
                    <h4>${t.done ? '✅' : '⬜'} ${t.name}</h4>
                    <span style="font-size:12px; color:#888;">${t.time} | ${t.date}</span>
                </div>
                <button onclick="deleteTask(${t.id})" style="background:none; border:none; color:var(--red); cursor:pointer;">🗑️</button>
            </div>
        `).join('');
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.getElementById('page-'+p).classList.add('active-page');
    }
</script>
</body>
</html>
