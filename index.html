<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQR SYSTEM | 2026</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --blue: #2196F3; --green: #4CAF50; --red: #f44336; --txt: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 120px; }
        header { padding: 20px; text-align: center; background: #111; border-bottom: 2px solid var(--gold); }
        #liveTime { font-size: 28px; font-weight: bold; color: var(--gold); }
        nav { display: flex; justify-content: center; background: #111; padding: 10px; gap: 8px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; flex-wrap: wrap; }
        nav button { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--gold); color: #000; }
        #notifBtn.on { border-color: var(--green); color: var(--green); }
        #notifBtn.off { border-color: var(--red); color: var(--red); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .section-title { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 10px; margin: 25px 0 15px 0; font-size: 20px; }
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; background: #181818; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-right: 5px solid var(--blue); }
        .task-item.done { border-right-color: var(--green); opacity: 0.6; }
        .striked h4 { text-decoration: line-through; color: #666; }
        footer { background: #000; padding: 25px; text-align: center; border-top: 1px solid #1a1a1a; position: fixed; bottom: 0; width: 100%; }
        .footer-text { color: white; font-size: 15px; }
        .footer-text span.brand { color: var(--gold); font-weight: bold; }
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

<header>
    <div id="liveTime">00:00:00</div>
    <div style="font-size: 14px; color: var(--gold); letter-spacing: 2px;">SAQR DESIGN SYSTEM 2026</div>
</header>

<nav>
    <button onclick="switchPage('main')" id="nav-main" class="active">🏠 المهام</button>
    <button onclick="switchPage('add')" id="nav-add">➕ إضافة</button>
    <button id="notifBtn" onclick="toggleNotifs()" class="off">🔕 الإشعارات: مغلقة</button>
</nav>

<div class="container">
    <div id="page-add" class="page">
        <div class="card">
            <h3 style="margin-top:0">إضافة مهمة جديدة</h3>
            <input type="text" id="taskName" placeholder="اسم المهمة...">
            <input type="date" id="taskDate">
            <input type="time" id="taskTime">
            <button class="btn-add" onclick="saveTask()">حفظ المهمة ✅</button>
        </div>
    </div>

    <div id="page-main" class="page active-page">
        <h3 class="section-title">📍 مهام اليوم</h3>
        <div id="list-today"></div>
        <h3 class="section-title">📅 مهام مستقبلية</h3>
        <div id="list-future"></div>
    </div>
</div>

<footer>
    <div class="footer-text">© 2026 <span class="brand">SAQR DESIGN</span>. جميع الحقوق محفوظة.</div>
</footer>

<script>
    let tasks = JSON.parse(localStorage.getItem('SAQR_FINAL_DB_2026')) || [];
    let isNotifActive = JSON.parse(localStorage.getItem('SAQR_NOTIF_STATUS')) || false;

    // --- نظام الإشعارات ---
    function toggleNotifs() {
        if (!isNotifActive) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    isNotifActive = true;
                    saveConfig();
                    new Notification("SAQR DESIGN", { body: "تم تفعيل الإشعارات بنجاح! ستظهر هنا." });
                } else {
                    alert("برجاء السماح بالإشعارات من إعدادات المتصفح أولاً.");
                }
            });
        } else {
            isNotifActive = false;
            saveConfig();
            alert("تم إيقاف الإشعارات.");
        }
    }

    function saveConfig() {
        localStorage.setItem('SAQR_NOTIF_STATUS', JSON.stringify(isNotifActive));
        updateNotifUI();
    }

    function updateNotifUI() {
        const btn = document.getElementById('notifBtn');
        btn.innerText = isNotifActive ? "🔔 الإشعارات: مفعلة" : "🔕 الإشعارات: مغلقة";
        btn.className = isNotifActive ? "on" : "off";
    }

    // --- فحص المواعيد ---
    setInterval(() => {
        const now = new Date();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('ar-EG');
        
        if (!isNotifActive) return;

        const d = now.toISOString().split('T')[0];
        const t = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        tasks.forEach(task => {
            if (task.date === d && task.time === t && !task.notified) {
                task.notified = true;
                localStorage.setItem('SAQR_FINAL_DB_2026', JSON.stringify(tasks));
                
                // إرسال الإشعار لشريط النظام
                if (Notification.permission === "granted") {
                    const n = new Notification("SAQR DESIGN | تذكير", {
                        body: `حان موعد: ${task.name}`,
                        icon: "https://cdn-icons-png.flaticon.com/512/311/311024.png",
                        requireInteraction: true // يبقى الإشعار حتى تغلقه أنت
                    });
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
                }
                render();
            }
        });
    }, 1000);

    // --- إدارة المهام ---
    function saveTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const time = document.getElementById('taskTime').value;
        if(!name || !date || !time) return alert("أكمل البيانات!");

        tasks.push({ id: Date.now(), name, date, time, done: false, notified: false });
        localStorage.setItem('SAQR_FINAL_DB_2026', JSON.stringify(tasks));
        document.getElementById('taskName').value = "";
        switchPage('main');
    }

    function toggleDone(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        localStorage.setItem('SAQR_FINAL_DB_2026', JSON.stringify(tasks));
        render();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('SAQR_FINAL_DB_2026', JSON.stringify(tasks));
        render();
    }

    function render() {
        const todayStr = new Date().toISOString().split('T')[0];
        const todayArea = document.getElementById('list-today');
        const futureArea = document.getElementById('list-future');

        const todayTasks = tasks.filter(t => t.date === todayStr);
        const futureTasks = tasks.filter(t => t.date > todayStr);

        todayArea.innerHTML = todayTasks.map(t => itemTemplate(t)).join('') || "<p style='color:#444'>لا مهام اليوم</p>";
        futureArea.innerHTML = futureTasks.map(t => itemTemplate(t)).join('') || "<p style='color:#444'>لا مهام مستقبلية</p>";
    }

    function itemTemplate(t) {
        return `
            <div class="task-item ${t.done ? 'done' : ''}">
                <div class="task-text ${t.done ? 'striked' : ''}" onclick="toggleDone(${t.id})" style="cursor:pointer; flex:1">
                    <h4 style="margin:0">${t.done ? '✅' : '⬜'} ${t.name}</h4>
                    <span style="font-size:12px; color:#888;">⏰ ${t.time} | ${t.date}</span>
                </div>
                <button onclick="deleteTask(${t.id})" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:20px;">🗑️</button>
            </div>`;
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active-page');
        document.getElementById('nav-'+p).classList.add('active');
        render();
    }

    updateNotifUI();
    render();
</script>
</body>
</html>
