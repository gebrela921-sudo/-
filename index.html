<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAQR SYSTEM FIXED</title>

<style>
body { background:#050505; color:#fff; font-family:Arial; padding:20px; }
input,button { width:100%; padding:10px; margin:5px 0; }
button { cursor:pointer; }

.task { background:#111; padding:10px; margin:5px 0; border-radius:8px; }
.on { color:green; }
.off { color:red; }
</style>
</head>

<body>

<h2>SAQR TASK SYSTEM</h2>

<button id="notifBtn" onclick="toggleNotifications()">🔕 الإشعارات</button>

<hr>

<input id="name" placeholder="اسم المهمة">
<input type="date" id="date">
<input type="time" id="time">
<button onclick="addTask()">حفظ المهمة</button>

<hr>

<h3>المهام</h3>
<div id="list"></div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let notifEnabled = JSON.parse(localStorage.getItem("notif")) || false;

/* 🔔 تحديث زر الإشعارات */
function updateBtn(){
document.getElementById("notifBtn").innerText =
notifEnabled ? "🔔 الإشعارات مفعلة" : "🔕 الإشعارات مغلقة";
}

/* 🔔 تشغيل الإشعارات */
function toggleNotifications(){

if(Notification.permission === "denied"){
alert("الإشعارات مقفولة من المتصفح");
return;
}

if(Notification.permission !== "granted"){
Notification.requestPermission().then(p=>{
if(p==="granted"){
notifEnabled = true;
localStorage.setItem("notif", true);
new Notification("SAQR", {body:"تم التفعيل"});
updateBtn();
}
});
return;
}

notifEnabled = !notifEnabled;
localStorage.setItem("notif", notifEnabled);
updateBtn();
}

/* 💾 حفظ المهمة */
function addTask(){

let n = document.getElementById("name").value;
let d = document.getElementById("date").value;
let t = document.getElementById("time").value;

if(!n || !d || !t){
alert("كمل البيانات");
return;
}

tasks.push({
id:Date.now(),
name:n,
date:d,
time:t,
done:false,
notified:false
});

localStorage.setItem("tasks", JSON.stringify(tasks));

document.getElementById("name").value="";
render();
}

/* 📌 عرض */
function render(){
document.getElementById("list").innerHTML =
tasks.map(t=>`
<div class="task">
${t.name}<br>
${t.date} - ${t.time}
</div>
`).join("");
}

/* ⏰ فحص الإشعارات */
setInterval(()=>{

if(!notifEnabled) return;

let now = new Date();
let d = now.toISOString().split("T")[0];
let t = now.toTimeString().slice(0,5);

tasks.forEach(task=>{
if(task.date===d && task.time===t && !task.notified){

task.notified = true;
localStorage.setItem("tasks", JSON.stringify(tasks));

if(Notification.permission==="granted"){
new Notification("تنبيه", {
body: task.name
});
}
}
});

},1000);

/* 🚀 تشغيل أولي */
updateBtn();
render();

</script>

</body>
</html>
