<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQR SYSTEM | 2026</title>
    <style>
        :root { 
            --gold: #d4af37; --bg: #050505; --card: #121212; 
            --blue: #2196F3; --green: #4CAF50; --red: #f44336; --txt: #ffffff; 
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 120px; }

        header { padding: 20px; text-align: center; background: #111; border-bottom: 2px solid var(--gold); }
        #liveTime { font-size: 28px; font-weight: bold; color: var(--gold); }

        nav { display: flex; justify-content: center; background: #111; padding: 10px; gap: 8px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        nav button { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--gold); color: #000; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }

        .section-title { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 10px; margin: 20px 0 15px 0; }

        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-add { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        .task-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #181818; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            border-right: 5px solid var(--blue);
        }
        .task-item.done { border-right-color: var(--green); opacity: 0.6; }
        .task-text { cursor: pointer; flex: 1; }
        .striked h4 { text-decoration: line-through; color: #666; }

        /* الفوتر كما في الصورة */
        footer { background: #000; padding: 25px; text-align: center; border-top: 1px solid #1a1a1a; position: fixed; bottom: 0; width: 100%; }
        .footer-text { color: white; font-size: 15px; }
        .footer-text span.brand { color: var(--gold); font-weight: bold; }

        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

<header>
    <div id="liveTime">00:00:00</div>
    <div style="font-size: 12px; color: var(--gold);">SAQR DESIGN SYSTEM | 2026</div>
</header>

<nav>
    <button onclick="switchPage('main')" id="nav-main" class="active">🏠 الرئيسية</button>
    <button onclick="switchPage('add')" id="nav-add">➕ إضافة مهمة</button>
    <button onclick="requestNotifPermission()" style="color:var(--green)">🔔 تفعيل التنبيهات</button>
</nav>

<div class="container">
    
    <div id="page-add" class="page">
        <div class="card">
            <h3>جدولة مهمة جديدة</h3>
            <input type="text" id="taskName" placeholder="اسم المهمة (مثلاً: تصميم شعار)">
            <input type="date" id="taskDate">
            <input type="time" id="taskTime">
            <button class="btn-add" onclick="addNewTask()">حفظ في الجدول</button>
        </div>
    </div>

    <div id="page-main" class="page active-page">
        
        <h3 class="section-title">📍 مهام اليوم</h3>
        <div id="list-today">
            <p style="color:#444; text-align:center;">لا توجد مهام مجدولة لليوم</p>
        </div>

        <h3 class="section-title">📅 مهام مستقبلية</h3>
        <div id="list-future">
            <p style="color:#444; text-align:center;">لا توجد مهام قادمة</p>
        </div>
        
    </div>

</div>

<footer>
    <div class="footer-text">© 2026 <span class="brand">SAQR DESIGN</span>. جميع الحقوق محفوظة.</div>
</footer>

<script>
    let tasks = JSON.parse(localStorage.getItem('SAQR_FINAL_2026')) || [];

    // تحديث الوقت وفحص الإشعارات كل ثانية
    setInterval(() => {
        const now = new Date();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('ar-EG');
        checkDeadlines(now);
    }, 1000);

    function requestNotifPermission() {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("تم تفعيل إشعارات شريط التنبيهات بنجاح ✅");
                // إشعار تجريبي للتأكد
                new Notification("SAQR DESIGN", { body: "نظام التنبيهات يعمل الآن!" });
            } else {
                alert("يجب السماح بالإشعارات من إعدادات المتصفح لظهورها في شريط المهام ⚠️");
            }
        });
    }

    function checkDeadlines(now) {
        const curDate = now.toISOString().split('T')[0];
        const curTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        tasks.forEach(t => {
            if (t.date === curDate && t.time === curTime && !t.notified) {
                t.notified = true;
                saveData();
                
                // إرسال الإشعار لشريط التنبيهات العلوي
                if (Notification.permission === "granted") {
                    new Notification("SAQR DESIGN | مهمة الآن", {
                        body: `حان موعد: ${t.name}`,
                        icon: "https://cdn-icons-png.flaticon.com/512/311/311024.png"
                    });
                    // تشغيل صوت
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
                }
            }
        });
    }

    function addNewTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const time = document.getElementById('taskTime').value;

        if(!name || !date || !time) return alert("يرجى إكمال البيانات");

        tasks.push({ id: Date.now(), name, date, time, done: false, notified: false });
        saveData();
        document.getElementById('taskName').value = "";
        switchPage('main');
    }

    function toggleDone(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        saveData();
    }

    function deleteTask(id) {
        if(confirm("حذف المهمة؟")) {
            tasks = tasks.filter(t => t.id !== id);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('SAQR_FINAL_2026', JSON.stringify(tasks));
        render();
    }

    function render() {
        const todayStr = new Date().toISOString().split('T')[0];
        
        const todayArea = document.getElementById('list-today');
        const futureArea = document.getElementById('list-future');

        const todayTasks = tasks.filter(t => t.date === todayStr);
        const futureTasks = tasks.filter(t => t.date > todayStr);

        todayArea.innerHTML = todayTasks.length ? todayTasks.map(t => itemHtml(t)).join('') : "<p style='color:#444; text-align:center;'>لا مهام لليوم</p>";
        futureArea.innerHTML = futureTasks.length ? futureTasks.map(t => itemHtml(t)).join('') : "<p style='color:#444; text-align:center;'>لا مهام قادمة</p>";
    }

    function itemHtml(t) {
        return `
            <div class="task-item ${t.done ? 'done' : ''}">
                <div class="task-text ${t.done ? 'striked' : ''}" onclick="toggleDone(${t.id})">
                    <h4>${t.done ? '✅' : '⬜'} ${t.name}</h4>
                    <span style="font-size:12px; color:#888;">⏰ ${t.time} | ${t.date}</span>
                </div>
                <button onclick="deleteTask(${t.id})" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:18px;">🗑️</button>
            </div>
        `;
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active-page');
        document.getElementById('nav-'+p).classList.add('active');
        render();
    }

    window.onload = render;
</script>
</body>
</html>
